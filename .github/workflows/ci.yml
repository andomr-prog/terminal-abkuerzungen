name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"

  lint-shell:
    name: Shell Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get install -y shellcheck zsh
      - name: shellcheck
        run: shellcheck --severity=warning --shell=bash cheat.zsh
      - name: zsh syntax check
        run: zsh -n cheat.zsh

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y bats zsh
      - name: Run tests
        run: bats tests/
